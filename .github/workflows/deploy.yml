name: Deploy to zakia-server

# Triggers on every push to main, or manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never overlap two deploys; queue them.
concurrency:
  group: deploy-handler
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, handler-deploy]
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Sync working tree to ~/handler-one-bot/
        # rsync, not git pull: keeps the canonical install dir on disk
        # decoupled from where the runner cloned. Excludes the on-server
        # state we never want overwritten by a deploy:
        #   .env   — secrets, only ever edited on the host
        #   .venv  — local virtualenv, repo-side has no idea about it
        #   *.log  — runtime logs
        #
        # NOTE: install path is NOT under ~/Documents/. macOS TCC blocks
        # launchd-spawned processes (which the runner is) from writing to
        # ~/Documents/, ~/Desktop/, etc. — silently, with no error.
        # See docs/RUNNER_SETUP.md → Troubleshooting → TCC.
        run: |
          rsync -a --delete ./ ~/handler-one-bot/ \
            --exclude .git \
            --exclude .env \
            --exclude .venv \
            --exclude '*.log'

      - name: Install / update dependencies
        # `pip install -e .` is idempotent — only reinstalls if pyproject changes.
        run: |
          cd ~/handler-one-bot
          .venv/bin/pip install --quiet -e .

      - name: Restart bot
        # The bot runs as a launchd LaunchAgent (com.handler.bot, installed
        # one-time via scripts/launchd/com.handler.bot.plist). `kickstart -k`
        # SIGKILLs the running bot; KeepAlive=true respawns it with the
        # freshly-rsynced code. This decouples the bot's lifetime from the
        # runner step — the previous nohup approach lost the bot when the
        # runner cleaned up its tracked processes.
        run: |
          : > ~/handler-one-bot/handler.log
          launchctl kickstart -k "gui/$(id -u)/com.handler.bot"

      - name: Smoke check
        # Tail the log until we see "Logged in as" (Discord handshake) or
        # a stack trace. 30s is plenty for cold-starting the bot + the
        # butler MCP subprocess.
        run: |
          for i in {1..30}; do
            if grep -q 'Logged in as' ~/handler-one-bot/handler.log 2>/dev/null; then
              echo "✓ bot logged in"
              tail -5 ~/handler-one-bot/handler.log
              exit 0
            fi
            if grep -q 'Traceback\|Error while finding' ~/handler-one-bot/handler.log 2>/dev/null; then
              echo "✗ bot crashed during startup"
              tail -50 ~/handler-one-bot/handler.log
              exit 1
            fi
            sleep 1
          done
          echo "✗ bot didn't log in within 30s"
          tail -50 ~/handler-one-bot/handler.log || true
          exit 1
